<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交換學校搜尋器 - CityU 交換指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-blue:#006494;--color-gold:#d19900;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;
  --radius-xl:1rem;--radius-full:9999px;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;--space-20:5rem;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Work Sans','Helvetica Neue',sans-serif;
  --transition:180ms cubic-bezier(.16,1,.3,1);
  --content-default:960px;--content-wide:1200px;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-blue:#5591c7;--color-gold:#e8af34;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);
  --shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:var(--space-16)}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6}
img,svg{display:block;max-width:100%;height:auto}
ul[role="list"]{list-style:none}
h1,h2,h3,h4{text-wrap:balance;line-height:1.15}
p,li{text-wrap:pretty}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button,[role="button"],input,select{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
::selection{background:oklch(from var(--color-primary) l c h/.25);color:var(--color-text)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.skip-link{position:absolute;top:-40px;left:0;background:var(--color-primary);color:var(--color-text-inverse);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);z-index:100}
.skip-link:focus{top:var(--space-2)}
.container{max-width:var(--content-wide);margin-inline:auto;padding-inline:clamp(var(--space-4),4vw,var(--space-8))}
.site-header{position:sticky;top:0;z-index:50;background:color-mix(in oklch,var(--color-bg) 90%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid oklch(from var(--color-divider) l c h / 0.5)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-block:var(--space-4);gap:var(--space-4)}
.logo{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:var(--color-text)}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.logo-text{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-family:var(--font-body);font-weight:400;margin-top:-2px}
.header-actions{display:flex;align-items:center;gap:var(--space-2)}
.theme-toggle{width:40px;height:40px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border:1px solid oklch(from var(--color-text) l c h / 0.1)}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-offset)}
.count-badge{font-size:var(--text-xs);color:var(--color-text-muted);background:var(--color-surface-offset);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full)}
.hero{padding:clamp(var(--space-12),8vw,var(--space-20)) 0 var(--space-8)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--color-primary);margin-bottom:var(--space-3)}
.hero h1{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:400;max-width:14ch;margin-bottom:var(--space-4);color:var(--color-text)}
.hero h1 em{font-style:italic;color:var(--color-primary)}
.hero-desc{font-size:var(--text-base);color:var(--color-text-muted);max-width:52ch;line-height:1.7;margin-bottom:var(--space-8)}
.hero-stats{display:flex;flex-wrap:wrap;gap:var(--space-6);padding-top:var(--space-6);border-top:1px solid var(--color-divider)}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-num{font-family:var(--font-display);font-size:var(--text-xl);color:var(--color-primary);line-height:1}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.06em}
.filters-bar{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/.08);border-radius:var(--radius-xl);padding:var(--space-4) var(--space-5);margin-bottom:var(--space-8);display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:var(--space-3);top:50%;transform:translateY(-50%);color:var(--color-text-muted);pointer-events:none;width:16px;height:16px}
.search-input{width:100%;padding:var(--space-2) var(--space-3) var(--space-2) calc(var(--space-3)*2 + 16px);background:var(--color-bg);border:1px solid oklch(from var(--color-text) l c h/.12);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text)}
.search-input::placeholder{color:var(--color-text-faint)}
.search-input:focus{outline:2px solid var(--color-primary);outline-offset:0;border-color:var(--color-primary)}
.filter-select{padding:var(--space-2) var(--space-3);background:var(--color-bg);border:1px solid oklch(from var(--color-text) l c h/.12);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text)}
.filter-select:focus{outline:2px solid var(--color-primary);outline-offset:0}
.filter-chips{display:flex;flex-wrap:wrap;gap:var(--space-2)}
.chip{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:500;border:1.5px solid oklch(from var(--color-text) l c h/.15);color:var(--color-text-muted);background:transparent}
.chip:hover{border-color:var(--color-primary);color:var(--color-primary)}
.chip.active{background:var(--color-primary-highlight);border-color:var(--color-primary);color:var(--color-primary)}
.clear-btn{font-size:var(--text-xs);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px solid oklch(from var(--color-text) l c h/.1)}
.clear-btn:hover{color:var(--color-text);background:var(--color-surface-offset)}
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:var(--space-5);margin-bottom:var(--space-16)}
.school-card{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/.08);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);cursor:pointer;transition:all var(--transition)}
.school-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:oklch(from var(--color-primary) l c h/.3)}
.school-card:active{transform:translateY(0)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-3)}
.card-flag{font-size:1.75rem;line-height:1;flex-shrink:0}
.card-badges{display:flex;flex-wrap:wrap;gap:var(--space-1);margin-top:var(--space-1)}
.badge{font-size:var(--text-xs);font-weight:500;letter-spacing:.03em;padding:2px var(--space-2);border-radius:var(--radius-full);background:var(--color-surface-offset)}
.badge-lang{background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface));color:var(--color-primary)}
.badge-city{background:color-mix(in oklch,var(--color-blue) 10%,var(--color-surface));color:var(--color-blue)}
.card-name{font-size:var(--text-sm);font-weight:600;color:var(--color-text);margin-bottom:var(--space-1);line-height:1.25}
.card-region{font-size:var(--text-xs);color:var(--color-text-muted)}
.card-divider{height:1px;background:var(--color-divider);margin:var(--space-3) 0}
.card-features{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-3)}
.feature-row{display:flex;align-items:flex-start;gap:var(--space-2)}
.feature-icon{width:14px;height:14px;flex-shrink:0;margin-top:3px;color:var(--color-text-faint)}
.feature-text{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:var(--space-3);border-top:1px solid var(--color-divider)}
.cost-wrap{display:flex;flex-direction:column;gap:1px}
.cost-label{font-size:var(--text-xs);color:var(--color-text-faint);text-transform:uppercase;letter-spacing:.06em}
.cost-value{font-size:var(--text-sm);font-weight:600;color:var(--color-text)}
.quota-wrap{font-size:var(--text-xs);color:var(--color-text-muted);text-align:right}
.quota-num{font-weight:600;color:var(--color-text)}
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:var(--space-20) var(--space-8);color:var(--color-text-muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:var(--space-4);color:var(--color-text-faint)}
.empty-state h3{color:var(--color-text);margin-bottom:var(--space-2);font-size:var(--text-lg)}
.empty-state p{max-width:36ch;margin-bottom:var(--space-6);font-size:var(--text-sm)}
.modal-backdrop{position:fixed;inset:0;background:oklch(0 0 0/.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:var(--space-4);opacity:0;pointer-events:none;transition:opacity var(--transition)}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--color-surface);border-radius:var(--radius-xl);padding:var(--space-6);max-width:600px;width:100%;max-height:90dvh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(40px);transition:transform var(--transition)}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-close{position:absolute;top:var(--space-4);right:var(--space-4);width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);background:transparent;border:1px solid oklch(from var(--color-text) l c h / 0.1)}
.modal-close:hover{background:var(--color-surface-offset);color:var(--color-text)}
.modal-wrap{position:relative}
.modal-flag{font-size:3rem;margin-bottom:var(--space-4)}
.modal-name{font-family:var(--font-display);font-size:var(--text-xl);margin-bottom:var(--space-1)}
.modal-region{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4)}
.modal-badges{display:flex;flex-wrap:wrap;gap:var(--space-2);margin-bottom:var(--space-5)}
.modal-section{margin-bottom:var(--space-5)}
.modal-section h3{font-size:var(--text-sm);font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-muted);margin-bottom:var(--space-3)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.info-item{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-3)}
.info-item .label{font-size:var(--text-xs);color:var(--color-text-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.info-item .value{font-size:var(--text-sm);font-weight:600;color:var(--color-text)}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:var(--space-2)}
.feature-list li{display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted)}
.feature-list li::before{content:"→";color:var(--color-primary);flex-shrink:0;font-weight:700;margin-top:2px}
.modal-apply{display:inline-flex;align-items:center;gap:var(--space-2);background:var(--color-primary);color:var(--color-text-inverse);padding:var(--space-3) var(--space-6);border-radius:var(--radius-lg);text-decoration:none;font-weight:600;border:none}
.modal-apply:hover{background:var(--color-primary-hover)}
footer{border-top:1px solid var(--color-divider);padding:var(--space-8) 0;color:var(--color-text-faint);font-size:var(--text-xs);text-align:center}
@media(max-width:640px){
.hero h1{font-size:clamp(1.75rem,6vw,2.5rem)}
.filters-bar{flex-direction:column;align-items:stretch}
.search-wrap{min-width:0}
.modal-grid{grid-template-columns:1fr}
.hero-stats{gap:var(--space-4)}
}
</style>
</head>
<body>
<a href="#main" class="skip-link">跳至主要內容</a>
<header class="site-header" role="banner">
  <div class="container header-inner">
    <a href="#" class="logo" aria-label="交換學校搜尋器主頁">
      <svg class="logo-mark" aria-hidden="true" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 16 Q12 8 16 16 Q20 24 24 16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
        <line x1="16" y1="1" x2="16" y2="31" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"/>
      </svg>
      <div>
        <div class="logo-text">ExchangeFinder</div>
        <div class="logo-sub">CityU 交換指南</div>
      </div>
    </a>
    <div class="header-actions">
      <span class="count-badge" id="countBadge">載入中…</span>
      <button class="theme-toggle" data-theme-toggle aria-label="切換深色模式">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>
<main id="main">
  <div class="container">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-eyebrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true"><circle cx="6" cy="6" r="6"/></svg>
        CityU 交換計劃參考資料
      </div>
      <h1 id="hero-title">找到你的<br><em>理想交流學校</em></h1>
      <p class="hero-desc">整合全球各地合作大學資訊，包括學校特色、語言要求、費用估算及地區生活參考，協助你作出更好的選校決定。</p>
      <div class="hero-stats" role="list">
        <div class="stat-item" role="listitem"><span class="stat-num" id="statTotal">—</span><span class="stat-label">合作院校</span></div>
        <div class="stat-item" role="listitem"><span class="stat-num" id="statRegions">—</span><span class="stat-label">地區</span></div>
        <div class="stat-item" role="listitem"><span class="stat-num" id="statCountries">—</span><span class="stat-label">國家 / 地區</span></div>
      </div>
    </section>
    <div class="filters-bar" role="search" aria-label="篩選學校">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" class="search-input" id="searchInput" placeholder="搜尋學校名稱或城市…" aria-label="搜尋學校">
      </div>
      <select class="filter-select" id="regionFilter" aria-label="篩選地區"><option value="">全部地區</option></select>
      <select class="filter-select" id="langFilter" aria-label="篩選教學語言">
        <option value="">全部語言</option>
        <option value="English">英語</option>
        <option value="Mandarin">普通話</option>
        <option value="Japanese">日語</option>
        <option value="Korean">韓語</option>
        <option value="French">法語</option>
        <option value="German">德語</option>
        <option value="Dutch">荷蘭語</option>
      </select>
      <div class="filter-chips" id="filterChips" role="group" aria-label="費用篩選"></div>
      <button class="clear-btn" id="clearBtn" aria-label="清除所有篩選">清除篩選</button>
    </div>
    <section aria-label="學校列表">
      <div class="schools-grid" id="schoolsGrid" role="list"></div>
      <div class="empty-state" id="emptyState" hidden aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <h3>找不到符合條件的學校</h3>
        <p>試試調整篩選條件或搜尋關鍵字</p>
        <button class="clear-btn" onclick="clearAll()">清除所有篩選</button>
      </div>
    </section>
  </div>
</main>
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalName" hidden>
  <div class="modal modal-wrap">
    <button class="modal-close" id="modalClose" aria-label="關閉">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div id="modalContent"></div>
  </div>
</div>
<footer>
  <div class="container">
    <p>資料僅供參考，請以各院校官方網站為準。如發現錯誤歡迎回報。</p>
    <p style="margin-top:var(--space-2)">ExchangeFinder · CityU 交換學生指南</p>
  </div>
</footer>
<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const sun='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.41 1.41M17.37 17.37l1.41 1.41M1 12h2M21 12h2M4.22 19.78l1.41-1.41M17.37 6.63l1.41-1.41"/></svg>';
  const moon='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  function upd(){t.innerHTML=d==='dark'?sun:moon;t.setAttribute('aria-label',d==='dark'?'切換淺色模式':'切換深色模式')}
  upd();
  t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);upd()});
})();

// 費用計算系統
function calculateTotalCost(school) {
  const cityLivingCosts = {
    'Tokyo': 2200, 'Sydney': 2500, 'Melbourne': 2300, 'Seoul': 1800,
    'Beijing': 1500, 'Shanghai': 2000, 'Hong Kong': 3000, 'Singapore': 2800,
    'Toronto': 2400, 'Vancouver': 2600, 'London': 2800, 'Berlin': 1800,
    'Paris': 2200, 'Amsterdam': 2400, 'Munich': 2000, 'Vienna': 1600,
    'Dublin': 2100, 'Copenhagen': 2500, 'Stockholm': 2300, 'Oslo': 2800,
    'Edinburgh': 2000, 'Madrid': 1800, 'Barcelona': 2000, 'Rome': 1700
  };

  const tuitionByCourse = 1500; 
  const accommodation = cityLivingCosts[school.city] || 2000;
  const food = accommodation * 0.4;
  const transport = accommodation * 0.15;
  const airfare = 800;
  
  const total = tuitionByCourse + accommodation + food + transport + airfare;
  return { total: Math.round(total), breakdown: { tuition: tuitionByCourse, accommodation, food, transport, airfare } };
}

const COST_BANDS=[
  {label:"低 (<港幣5k/月)",key:"low",test:c=>calculateTotalCost({city:'Beijing'}).total<5000},
  {label:"中 (港幣5k–10k)",key:"mid",test:c=>{const t=calculateTotalCost({city:'Tokyo'}).total;return t>=5000&&t<10000}},
  {label:"高 (>港幣10k)",key:"high",test:c=>calculateTotalCost({city:'Sydney'}).total>=10000}
];

let state={search:'',region:'',lang:'',cost:''};

function init(){
  const regions=[...new Set(SCHOOLS.map(s=>s.region))].sort();
  const sel=document.getElementById('regionFilter');
  regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  const chips=document.getElementById('filterChips');
  COST_BANDS.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='chip';btn.dataset.cost=b.key;btn.textContent=b.label;
    btn.setAttribute('role','radio');btn.setAttribute('aria-checked','false');
    btn.addEventListener('click',()=>{state.cost=state.cost===b.key?'':b.key;render();});
    chips.appendChild(btn);
  });
  document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value.toLowerCase();render();});
  document.getElementById('regionFilter').addEventListener('change',e=>{state.region=e.target.value;render();});
  document.getElementById('langFilter').addEventListener('change',e=>{state.lang=e.target.value;render();});
  document.getElementById('clearBtn').addEventListener('click',clearAll);
  document.getElementById('modalClose').addEventListener('click',closeModal);
  document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  document.getElementById('statTotal').textContent=SCHOOLS.length;
  document.getElementById('statRegions').textContent=[...new Set(SCHOOLS.map(s=>s.region))].length;
  document.getElementById('statCountries').textContent=[...new Set(SCHOOLS.map(s=>s.country))].length;
  render();
}

function clearAll(){
  state={search:'',region:'',lang:'',cost:''};
  document.getElementById('searchInput').value='';
  document.getElementById('regionFilter').value='';
  document.getElementById('langFilter').value='';
  render();
}

function getFiltered(){
  return SCHOOLS.filter(s=>{
    if(state.search){const hay=`${s.name} ${s.city} ${s.country} ${s.features.join(' ')}`.toLowerCase();if(!hay.includes(state.search))return false;}
    if(state.region&&s.region!==state.region)return false;
    if(state.lang&&!s.lang.includes(state.lang))return false;
    if(state.cost){
      const cost=calculateTotalCost(s).total;
      if(state.cost==='low'&&cost>=5000)return false;
      if(state.cost==='mid'&&(cost<5000||cost>=10000))return false;
      if(state.cost==='high'&&cost<10000)return false;
    }
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  const grid=document.getElementById('schoolsGrid');
  const empty=document.getElementById('emptyState');
  document.getElementById('countBadge').textContent=`${filtered.length} 所學校`;
  document.querySelectorAll('.chip').forEach(c=>{const a=c.dataset.cost===state.cost;c.classList.toggle('active',a);c.setAttribute('aria-checked',String(a));});
  if(!filtered.length){grid.innerHTML='';grid.hidden=true;empty.hidden=false;return;}
  grid.hidden=false;empty.hidden=true;
  grid.innerHTML=filtered.map(s=>{
    const {total}=calculateTotalCost(s);
    return `
    <article class="school-card" role="listitem" tabindex="0"
      aria-label="${s.name} — ${s.city}"
      onclick="openModal(${s.id})" onkeydown="if(event.key==='Enter')openModal(${s.id})">
      <div class="card-header">
        <div><div class="card-name">${s.name}</div><div class="card-region">${s.country} · ${s.city}</div></div>
        <div><div class="card-flag" aria-hidden="true">${s.flag}</div>
          <div class="card-badges">${s.lang.map(l=>`<span class="badge badge-lang">${l}</span>`).join('')}</div>
        </div>
      </div>
      <div class="card-divider" aria-hidden="true"></div>
      <ul class="card-features" role="list">
        ${s.features.slice(0,2).map(f=>`<li class="feature-row" role="listitem"><svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg><span class="feature-text">${f}</span></li>`).join('')}
      </ul>
      <div class="card-footer">
        <div class="cost-wrap"><span class="cost-label">估計月費</span><span class="cost-value">HK$${(total/12).toLocaleString('zh-HK')}</span></div>
        <div class="quota-wrap">配額<br><span class="quota-num">${s.quota}</span></div>
      </div>
    </article>
  `}).join('');
}

function openModal(id){
  const s=SCHOOLS.find(x=>x.id===id);if(!s)return;
  const {total,breakdown}=calculateTotalCost(s);
  const backdrop=document.getElementById('modalBackdrop');
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-flag" aria-hidden="true">${s.flag}</div>
    <h2 class="modal-name" id="modalName">${s.name}</h2>
    <div class="modal-region">${s.region} · ${s.country} · ${s.city}</div>
    <div class="modal-badges">${s.lang.map(l=>`<span class="badge badge-lang">${l}</span>`).join('')}<span class="badge badge-city">${s.city}</span></div>
    
    <div class="modal-section"><h3>基本資訊</h3>
      <div class="modal-grid">
        <div class="info-item"><div class="label">每學期配額</div><div class="value">${s.quota}</div></div>
        <div class="info-item"><div class="label">教學語言</div><div class="value">${s.lang.join(' / ')}</div></div>
        <div class="info-item"><div class="label">地區</div><div class="value">${s.region}</div></div>
        <div class="info-item"><div class="label">國家</div><div class="value">${s.country}</div></div>
      </div>
    </div>

    <div class="modal-section"><h3>費用估算</h3>
      <div class="modal-grid">
        <div class="info-item"><div class="label">學費/月</div><div class="value">HK$${breakdown.tuition.toLocaleString('zh-HK')}</div></div>
        <div class="info-item"><div class="label">住宿/月</div><div class="value">HK$${breakdown.accommodation.toLocaleString('zh-HK')}</div></div>
        <div class="info-item"><div class="label">生活費/月</div><div class="value">HK$${breakdown.food.toLocaleString('zh-HK')}</div></div>
        <div class="info-item"><div class="label">交通/月</div><div class="value">HK$${breakdown.transport.toLocaleString('zh-HK')}</div></div>
        <div class="info-item"><div class="label">估計機票</div><div class="value">HK$${breakdown.airfare.toLocaleString('zh-HK')}</div></div>
        <div class="info-item"><div class="label"><strong>年均總費</strong></div><div class="value"><strong>HK$${(total*12).toLocaleString('zh-HK')}</strong></div></div>
      </div>
    </div>

    <div class="modal-section"><h3>學校特色</h3>
      <ul class="feature-list" role="list">${s.features.map(f=>`<li>${f}</li>`).join('')}</ul>
    </div>
  `;
  backdrop.hidden=false;
  requestAnimationFrame(()=>backdrop.classList.add('open'));
  document.getElementById('modalClose').focus();
  document.body.style.overflow='hidden';
}

function closeModal(){
  const b=document.getElementById('modalBackdrop');
  b.classList.remove('open');
  setTimeout(()=>{b.hidden=true;document.body.style.overflow='';},200);
}

init();
</script>
